<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Clear Cache</title>
</head>
<body>
    <h1>Cache Cleared!</h1>
    <p>Click the button below to go to the main application with fresh cache:</p>
    <button onclick="window.location.href='index.html?nocache=' + Date.now()" style="padding: 20px; font-size: 18px;">
        Go to Application (Fresh)
    </button>
    
    <script>
        // Clear all caches
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
        
        // Clear session storage
        sessionStorage.clear();
        
        console.log('Cache cleared!');
    </script>
</body>
</html>
