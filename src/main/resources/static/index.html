<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Dynamic Workflow Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Dynamic Approval Workflow</span>
            <div>
                <a href="admin.html" class="btn btn-light btn-sm me-2">Admin Panel</a>
                <a href="/camunda" target="_blank" class="btn btn-light btn-sm">Camunda Cockpit</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Create Request Section -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5>Create New Request</h5>
                    </div>
                    <div class="card-body">
                        <form id="createRequestForm">
                            <div class="mb-3">
                                <label class="form-label">Select Form (Optional)</label>
                                <select class="form-select" id="formSelect">
                                    <option value="">Use Basic Form</option>
                                </select>
                                <small class="text-muted">Select a dynamic form or use the basic form below</small>
                            </div>
                            
                            <div id="basicFormFields">
                                <div class="mb-3">
                                    <label class="form-label">Requester Name</label>
                                    <input type="text" class="form-control" id="requester">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" class="form-control" id="productName">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Description</label>
                                    <textarea class="form-control" id="description" rows="3"></textarea>
                                </div>
                            </div>
                            
                            <div id="dynamicFormFields"></div>
                            
                            <button type="submit" class="btn btn-success">Create Request</button>
                        </form>
                        <div id="createResult" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <!-- Pending Tasks Section -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5>My Pending Tasks</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Select Your Role</label>
                            <select class="form-select" id="roleSelect">
                                <option value="">Loading levels...</option>
                            </select>
                        </div>
                        <button class="btn btn-info" onclick="loadTasks()">Load Tasks</button>
                        <div id="tasksList" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task Details Modal -->
        <div class="modal fade" id="taskModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Task Details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="taskDetails"></div>
                        <div id="taskFormFields"></div>
                        <hr>
                        <div class="mb-3">
                            <label class="form-label">Comments</label>
                            <textarea class="form-control" id="taskComments" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Action</label>
                            <select class="form-select" id="taskDecision">
                                <option value="APPROVE">Approve</option>
                                <option value="REJECT">Reject (Send to Level 1 for review)</option>
                                <option value="QUERY">Raise Query (Ask Level 1 a question)</option>
                            </select>
                        </div>
                        <div id="querySection" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">Query Text</label>
                                <textarea class="form-control" id="queryText" rows="3" placeholder="Enter your question..."></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="submitDecision()">Submit</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistics Section -->
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h5>System Status</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3">
                                <div class="stat-box">
                                    <h3 id="totalRequests">0</h3>
                                    <p>Total Requests</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-box">
                                    <h3 id="pendingTasks">0</h3>
                                    <p>Pending Tasks</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-box">
                                    <h3 id="completedRequests">0</h3>
                                    <p>Completed</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-box">
                                    <h3 id="activeLevels">3</h3>
                                    <p>Active Levels</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js?v=20260217005000"></script>
</body>
</html>
