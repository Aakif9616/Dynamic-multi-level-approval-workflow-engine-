spring:
  application:
    name: dynamic-approval-workflow
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: admin123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: Admin
    filter:
      create: All tasks
    authorization:
      enabled: false
    database:
      schema-update: true
    job-execution:
      enabled: true

server:
  port: 8080

logging:
  level:
    org.camunda: INFO
    com.workflow: DEBUG
