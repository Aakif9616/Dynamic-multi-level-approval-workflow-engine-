spring:
  application:
    name: dynamic-approval-workflow
  datasource:
    url: jdbc:h2:mem:workflowdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: Admin
    filter:
      create: All tasks
    authorization:
      enabled: false
    database:
      schema-update: create-drop
    job-execution:
      enabled: true

server:
  port: 8080

logging:
  level:
    org.camunda: INFO
    com.workflow: DEBUG
